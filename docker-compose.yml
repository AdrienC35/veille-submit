services:
  veille-submit:
    build: .
    container_name: veille-submit
    restart: unless-stopped
    ports:
      - "7890:7890"
    env_file:
      - .env
    environment:
      PGHOST: postgres
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: veille-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PGDATABASE:-main}
      POSTGRES_USER: ${PGUSER:-admin}
      POSTGRES_PASSWORD: ${PGPASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    # ports:
    #   - "5432:5432"  # Uncomment only if you need external DB access

volumes:
  pgdata:
